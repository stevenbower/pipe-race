<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>PipeWorks Derby</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Fredoka',system-ui,sans-serif;color:#fff8e8}
  body{
    background:linear-gradient(160deg,#ff9ed8 0%,#6dc8ff 50%,#b888ff 100%);
    user-select:none;-webkit-user-select:none;
  }

  .frame{
    position:fixed;inset:8px;border-radius:28px;border:6px solid transparent;
    background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0)) padding-box,
      linear-gradient(135deg,#fff0a8 0%,#ffb84a 25%,#ff6fb3 50%,#a96bff 75%,#6dc8ff 100%) border-box;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.3);
    pointer-events:none;z-index:2;
  }

  .app{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;padding:14px 14px 12px;
  }

  header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;gap:8px}
  .logo h1{
    font-family:'Bungee',cursive;font-size:clamp(18px,4vw,32px);
    margin:0;letter-spacing:1.5px;color:#fff8e8;
    text-shadow:0 2px 0 #c47818,0 4px 0 #6a3a08;
  }
  .logo h1 .accent{color:#ffd84a}
  .logo h1 .pop{color:#5de8b8}
  .head-btns{display:flex;gap:6px}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
    font-size:16px;color:#5a1a78;
    background:linear-gradient(180deg,#fff0a8,#ffb84a);
    box-shadow:0 3px 0 #c47818;
    display:flex;align-items:center;justify-content:center;
  }

  .mode-bar{flex:0 0 auto;display:flex;gap:6px;padding:0 8px 4px;justify-content:center}
  .mode-pill{
    padding:5px 12px;border-radius:999px;border:none;cursor:pointer;
    font-family:'Bungee',cursive;font-size:10px;letter-spacing:1px;
    background:rgba(255,255,255,.2);color:#fff;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.3);
  }
  .mode-pill.active{
    background:linear-gradient(180deg,#ffd84a,#ff9a3d);color:#5a1a78;
    box-shadow:0 3px 0 #c47818;
  }

  .elim-bar{
    flex:0 0 auto;display:flex;gap:6px;padding:0 8px 4px;justify-content:center;align-items:center;
  }
  .elim-bar .elim-label{
    font-family:'Bungee',cursive;font-size:9px;letter-spacing:1px;
    color:rgba(255,255,255,.85);margin-right:4px;
  }
  .elim-pill{
    padding:4px 10px;border-radius:999px;border:none;cursor:pointer;
    font-family:'Bungee',cursive;font-size:9px;letter-spacing:1px;
    background:rgba(255,255,255,.15);color:#fff;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);
  }
  .elim-pill.active{
    background:linear-gradient(180deg,#ff8fc8,#e02d8a);color:#fff;
    box-shadow:0 2px 0 #8a1450,inset 0 1px 0 rgba(255,255,255,.4);
  }
  .elim-bar.tourney-mode{opacity:.4;pointer-events:none}

  /* Random pick button in picker */
  .picker-toolbar{
    display:flex;gap:8px;padding:0 4px 8px;align-items:center;flex:0 0 auto;
  }
  .randomize-btn{
    flex:1;padding:10px 12px;border:none;border-radius:12px;cursor:pointer;
    font-family:'Bungee',cursive;font-size:11px;letter-spacing:1px;
    background:linear-gradient(180deg,#ffd84a,#ff9a3d);color:#5a1a78;
    box-shadow:0 3px 0 #c47818,inset 0 1px 0 rgba(255,255,255,.5);
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .randomize-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #c47818}
  .randomize-btn:disabled{opacity:.4;cursor:not-allowed}
  .clear-pick-btn{
    flex:0 0 auto;padding:10px 14px;border:none;border-radius:12px;cursor:pointer;
    font-family:'Bungee',cursive;font-size:11px;letter-spacing:1px;
    background:rgba(255,255,255,.25);color:#fff;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
  }
  .clear-pick-btn:disabled{opacity:.4;cursor:not-allowed}

  .track-wrap{flex:1 1 auto;min-height:200px;margin:4px auto 0;width:100%;max-width:780px;display:flex;flex-direction:column}
  .scoreboard{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;padding:4px 8px 6px;gap:8px}
  .race-num{font-family:'Bungee',cursive;font-size:12px;color:#fff;text-shadow:0 2px 4px rgba(80,30,120,.5)}
  .winner-tag{
    font-family:'Bungee',cursive;font-size:12px;
    padding:5px 12px;border-radius:999px;
    background:linear-gradient(180deg,#ffe89a,#ffb84a);color:#5a3008;
    box-shadow:0 3px 0 #6a3a08;
    opacity:0;transition:opacity .35s;
    white-space:nowrap;max-width:60%;overflow:hidden;text-overflow:ellipsis;
  }
  .winner-tag.show{opacity:1}
  .svg-box{flex:1 1 auto;min-height:0;width:100%;display:flex}
  .svg-track{width:100%;height:100%;display:block}
  /* In same-tube mode, hide side lane ports/gates so the middle pipe stands out */
  .svg-track.same-tube .port-side, .svg-track.same-tube .gate-side{
    opacity:0.15;
    transition:opacity .3s;
  }
  /* In two-tube mode (tournament), hide the middle port/gate */
  .svg-track.two-tube .port-mid, .svg-track.two-tube .gate-mid{
    opacity:0.15;
    transition:opacity .3s;
  }
  .svg-track .port-side, .svg-track .gate-side, .svg-track .port-mid, .svg-track .gate-mid{transition:opacity .3s}

  .controls{flex:0 0 auto;margin:8px auto 0;width:100%;max-width:780px;display:flex;flex-direction:column;gap:8px}
  .platform{
    height:64px;border-radius:18px;
    background:linear-gradient(180deg,#a96bff 0%,#6a2aa8 100%);
    box-shadow:inset 0 2px 0 rgba(255,220,255,.35),0 5px 0 #3a1268;
    display:flex;align-items:center;justify-content:space-around;padding:0 14px;
  }
  .slot{
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#2a0a48,#0a0220);
    box-shadow:inset 0 4px 8px rgba(0,0,0,.7),0 0 0 3px #ffb84a;
    display:flex;align-items:center;justify-content:center;
  }
  .slot .placed{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.35),inset 0 3px 4px rgba(255,255,255,.5);
  }
  .slot .placed svg, .slot .placed img{width:70%;height:70%}

  .actions{display:flex;gap:8px}
  .picker-btn,.lever-btn,.reset-btn{
    flex:1;min-height:50px;border:none;cursor:pointer;
    font-family:'Bungee',cursive;letter-spacing:1px;border-radius:14px;
    font-size:12px;
  }
  .picker-btn{
    color:#1a4a8a;
    background:linear-gradient(180deg,#a8e8ff 0%,#4aa8ff 100%);
    box-shadow:0 4px 0 #1a5aa8;
  }
  .lever-btn{
    font-size:14px;color:#fff;
    background:linear-gradient(180deg,#ff8fc8 0%,#e02d8a 100%);
    box-shadow:0 4px 0 #8a1450;
  }
  .lever-btn:disabled{
    background:linear-gradient(180deg,#8a7090,#4a3a52);color:#c8b8d0;
    box-shadow:0 4px 0 #2a1a32;cursor:not-allowed;
  }
  .reset-btn{
    flex:0 0 50px;font-size:16px;color:#fff;
    background:linear-gradient(180deg,#ffd84a,#ff9a3d);
    box-shadow:0 4px 0 #c47818;
  }

  /* Sheets */
  .sheet{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(40,10,80,.55)}
  .sheet.open{display:flex}
  .sheet-body{
    width:100%;max-height:88vh;
    background:linear-gradient(180deg,#ff9ed8 0%,#a96bff 50%,#6dc8ff 100%);
    border-radius:28px 28px 0 0;
    padding:14px 16px 24px;
    display:flex;flex-direction:column;
  }
  .sheet-head{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 10px}
  .sheet-head h2{font-family:'Bungee',cursive;font-size:15px;color:#fff;margin:0}
  .sheet-head .count{font-family:'Bungee',cursive;font-size:12px;color:#5a1a78;background:#ffd84a;padding:5px 10px;border-radius:999px}

  /* Responsive grid:
     - Phones: 5 columns (cells ~50-70px)
     - Tablets in portrait: ~7-8 columns
     - Tablets in landscape: ~10-12 columns
     - Each cell capped at ~80px so balls never get huge.
  */
  .ball-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(56px, 1fr));
    gap:8px;
    overflow-y:auto;
    max-height:55vh;
    padding:4px 2px 8px;
    justify-content:center;
  }
  .ball-pick{
    max-width:80px;
    margin:0 auto;
    width:100%;
  }
  /* On wider screens, allow the sheet to be narrower & centered */
  @media (min-width: 700px){
    .sheet{align-items:center;justify-content:center}
    .sheet-body{
      max-width:640px;
      max-height:80vh;
      border-radius:24px;
      margin:auto;
    }
    .ball-grid{
      grid-template-columns:repeat(auto-fill, minmax(64px, 1fr));
      max-height:50vh;
    }
    .ball-pick{max-width:84px}
  }
  @media (min-width: 1000px){
    .sheet-body{max-width:760px}
    .ball-grid{grid-template-columns:repeat(auto-fill, minmax(70px, 1fr))}
    .ball-pick{max-width:90px}
  }
  .ball-pick{
    aspect-ratio:1/1;border-radius:50%;border:none;cursor:pointer;
    position:relative;display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 -5px 8px rgba(0,0,0,.3),0 3px 8px rgba(40,10,80,.4);
    overflow:hidden;
  }
  .ball-pick svg.brand, .ball-pick img.brand{width:55%;height:55%;object-fit:contain}
  .ball-pick.selected{box-shadow:inset 0 -5px 8px rgba(0,0,0,.3),0 0 0 3px #ffd84a,0 0 18px rgba(255,216,74,.8)}
  .ball-pick.disabled{opacity:.35;cursor:not-allowed}
  .ball-pick.eliminated{opacity:.45;cursor:not-allowed;filter:grayscale(.7)}
  .ball-pick.eliminated::after{
    content:"✕";
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:900;
    color:#fff;
    text-shadow:0 0 4px rgba(0,0,0,.9), 0 2px 8px rgba(200,30,30,.9);
    background:rgba(180,20,40,.35);
  }
  .ball-pick .check{
    position:absolute;top:-3px;right:-3px;width:20px;height:20px;border-radius:50%;
    background:#1ac850;color:#fff;font-size:12px;
    display:none;align-items:center;justify-content:center;
    border:2px solid #fff;
  }
  .ball-pick.selected .check{display:flex}
  .ball-pick .name{
    position:absolute;bottom:3px;font-size:7px;font-weight:700;
    color:rgba(0,0,0,.75);
    background:rgba(255,255,255,.8);padding:1px 3px;border-radius:3px;
    max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    z-index:2;
  }
  .picker-actions{display:flex;gap:8px;margin-top:12px}
  .picker-actions button{flex:1;min-height:44px;border:none;border-radius:12px;font-family:'Bungee',cursive;font-size:12px;cursor:pointer}
  .btn-cancel{background:rgba(255,255,255,.25);color:#fff}
  .btn-confirm{background:linear-gradient(180deg,#7be88a,#1ac850);color:#0a4a18}
  .btn-confirm:disabled{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4);cursor:not-allowed}

  .picker-hint{
    text-align:center;color:rgba(255,255,255,.85);font-size:10px;
    padding:0 4px 6px;
  }

  .history-list{flex:1 1 auto;overflow-y:auto;display:flex;flex-direction:column;gap:6px;max-height:50vh}
  .empty-state{text-align:center;color:rgba(255,255,255,.85);padding:30px 20px;font-size:13px}
  .empty-state .big{font-size:42px;display:block;margin-bottom:6px}
  .h-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border-radius:12px;padding:8px 10px}
  .h-num{font-family:'Bungee',cursive;font-size:10px;color:#fff;background:rgba(0,0,0,.25);padding:3px 6px;border-radius:6px;min-width:36px;text-align:center}
  .h-winner{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;overflow:hidden}
  .h-winner svg, .h-winner img{width:65%;height:65%;object-fit:contain}
  .h-info{flex:1 1 auto;min-width:0}
  .h-info .name{font-weight:600;color:#fff;font-size:12px}
  .h-info .vs{font-size:9px;color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .leaderboard{margin-top:8px;padding:10px;border-radius:12px;background:rgba(255,255,255,.15)}
  .leaderboard h3{margin:0 0 6px;font-family:'Bungee',cursive;font-size:10px;color:#ffd84a}
  .leader-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:#fff}
  .leader-row .ball-mini{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .leader-row .ball-mini svg, .leader-row .ball-mini img{width:65%;height:65%;object-fit:contain}
  .leader-row .nm{flex:1 1 auto}
  .leader-row .wn{font-family:'Bungee',cursive;color:#ffd84a;font-size:10px}

  /* Result popup */
  .result-overlay{
    position:fixed;inset:0;z-index:55;display:none;align-items:center;justify-content:center;
    background:rgba(40,10,80,.7);padding:20px;
  }
  .result-overlay.open{display:flex;animation:fadein .2s}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .result-card{
    background:linear-gradient(180deg,#ff9ed8 0%,#a96bff 50%,#6dc8ff 100%);
    border-radius:24px;padding:20px;max-width:380px;width:100%;
    text-align:center;
    box-shadow:0 20px 60px rgba(40,10,80,.6),inset 0 2px 0 rgba(255,255,255,.4);
    animation:popIn .35s cubic-bezier(.2,.9,.3,1.4);
  }
  @keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .result-card h2{
    font-family:'Bungee',cursive;font-size:18px;margin:0 0 4px;
    color:#fff;letter-spacing:1.5px;
    text-shadow:0 2px 4px rgba(80,30,120,.5);
  }
  .result-card .winner-block{
    margin:14px 0 8px;padding:14px;border-radius:16px;
    background:linear-gradient(135deg,#ffd84a,#ff9a3d);
    color:#5a1a78;
  }
  .result-card .winner-block .crown{font-size:24px;display:block;margin-bottom:4px}
  .result-card .winner-block .ball-big{
    width:60px;height:60px;border-radius:50%;margin:6px auto;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.3),inset 0 3px 4px rgba(255,255,255,.6),0 4px 10px rgba(0,0,0,.3);
  }
  .result-card .winner-block .ball-big svg, .result-card .winner-block .ball-big img{width:65%;height:65%;object-fit:contain}
  .result-card .winner-block .name{font-family:'Bungee',cursive;font-size:18px;letter-spacing:1px;margin:4px 0 0}
  .result-card .winner-block .label{font-size:10px;letter-spacing:2px;font-family:'Bungee',cursive;opacity:.7}
  .result-card .losers-block{
    margin:8px 0;padding:10px;border-radius:14px;
    background:rgba(0,0,0,.2);
  }
  .result-card .losers-block .label{
    font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;
    color:#ff6b6b;margin-bottom:6px;
  }
  .loser-row{
    display:flex;align-items:center;gap:8px;padding:4px 6px;
    background:rgba(180,20,40,.2);border-radius:10px;margin-bottom:4px;
    color:#fff;font-size:13px;
    position:relative;
  }
  .loser-row:last-child{margin-bottom:0}
  .loser-row .ball-mini{
    width:28px;height:28px;border-radius:50%;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    filter:grayscale(.5);opacity:.8;
    box-shadow:inset 0 -2px 3px rgba(0,0,0,.3),inset 0 1px 2px rgba(255,255,255,.4);
  }
  .loser-row .ball-mini svg, .loser-row .ball-mini img{width:65%;height:65%;object-fit:contain}
  .loser-row .x{
    position:absolute;left:14px;top:50%;transform:translate(-50%,-50%);
    color:#ff3030;font-weight:900;font-size:22px;
    text-shadow:0 0 3px #fff, 0 0 6px rgba(255,48,48,.8);
    pointer-events:none;
  }
  .loser-row .nm{flex:1 1 auto;text-align:left;font-weight:600}
  .loser-row .tag{font-size:10px;color:#ffaaaa;font-family:'Bungee',cursive;letter-spacing:1px}
  .result-card button.continue{
    margin-top:8px;padding:12px 24px;border:none;border-radius:14px;
    font-family:'Bungee',cursive;font-size:13px;letter-spacing:1.5px;cursor:pointer;
    background:linear-gradient(180deg,#7be88a,#1ac850);
    color:#0a4a18;box-shadow:0 4px 0 #0a6a18;
    width:100%;
  }

  .bracket-overlay{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;background:rgba(40,10,80,.85);padding:16px}
  .bracket-overlay.open{display:flex}
  .bracket-card{
    background:linear-gradient(180deg,#ff9ed8 0%,#a96bff 50%,#6dc8ff 100%);
    border-radius:20px;padding:16px;max-width:520px;width:100%;
    text-align:center;max-height:90vh;overflow-y:auto;
  }
  .bracket-card h2{font-family:'Bungee',cursive;font-size:16px;color:#fff;margin:0 0 10px}
  .bracket-rounds{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .bracket-round{background:rgba(255,255,255,.18);border-radius:10px;padding:8px;min-width:110px}
  .bracket-round .lbl{font-family:'Bungee',cursive;font-size:9px;color:#ffd84a;margin-bottom:4px}
  .matchup{display:flex;flex-direction:column;gap:3px;margin-bottom:4px}
  .competitor{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:6px;background:rgba(255,255,255,.2);font-size:10px;color:#fff}
  .competitor.winner{background:linear-gradient(180deg,#ffd84a,#ff9a3d);color:#5a1a78;font-weight:700}
  .competitor.pending{opacity:.5}
  .ball-tiny{width:16px;height:16px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .ball-tiny svg, .ball-tiny img{width:65%;height:65%;object-fit:contain}
  .bracket-actions{display:flex;gap:8px;justify-content:center}
  .bracket-actions button{padding:10px 20px;border:none;border-radius:12px;font-family:'Bungee',cursive;font-size:11px;cursor:pointer}
  .btn-next{background:linear-gradient(180deg,#7be88a,#1ac850);color:#0a4a18}
  .btn-quit{background:rgba(255,255,255,.25);color:#fff}
  .champion-banner{
    margin:10px 0;padding:12px;border-radius:14px;
    background:linear-gradient(135deg,#ffd84a,#ff9a3d,#ff6fb3);
    color:#5a1a78;font-family:'Bungee',cursive;
  }
  .champion-banner .ball-big{width:48px;height:48px;border-radius:50%;margin:6px auto;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff}
  .champion-banner .ball-big svg, .champion-banner .ball-big img{width:65%;height:65%;object-fit:contain}

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden;display:none}
  .confetti.show{display:block}
  .confetti span{position:absolute;top:-20px;width:8px;height:12px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

  /* Inline confirm dialog (replaces native confirm) */
  .confirm-overlay{
    position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;
    background:rgba(40,10,80,.7);padding:20px;
  }
  .confirm-overlay.open{display:flex}
  .confirm-card{
    background:linear-gradient(180deg,#ff9ed8 0%,#a96bff 100%);
    border-radius:20px;padding:20px;max-width:320px;width:100%;text-align:center;
    box-shadow:0 20px 60px rgba(40,10,80,.6);
  }
  .confirm-card h3{font-family:'Bungee',cursive;font-size:16px;color:#fff;margin:0 0 8px}
  .confirm-card p{font-size:12px;color:rgba(255,255,255,.85);margin:0 0 14px}
  .confirm-actions{display:flex;gap:8px}
  .confirm-actions button{flex:1;padding:10px;border:none;border-radius:12px;font-family:'Bungee',cursive;font-size:11px;cursor:pointer}
  .btn-no{background:rgba(255,255,255,.25);color:#fff}
  .btn-yes{background:linear-gradient(180deg,#ff7070,#c81a1a);color:#fff;box-shadow:0 3px 0 #6a0a0a}
</style>
</head>
<body>

<div class="frame"></div>

<div class="app">
  <header>
    <div class="logo"><h1>Pipe<span class="accent">Works</span> <span class="pop">Derby</span></h1></div>
    <div class="head-btns">

  var ROSTER_SIZE = Math.min(30, BRAND_POOL.length);

  function pickRandomRoster(){
    var pool = BRAND_POOL.slice();
    // Fisher-Yates shuffle
    for(var i = pool.length-1; i > 0; i--){

    try {

  /* ============================================================
     SMOOTH SERPENTINE PIPE PATHS
     Generate truly smooth S-curves where each cubic segment's
     end-tangent matches the next segment's start-tangent.
     We do this by sampling y every chunk and choosing alternating
     x offsets, then connecting with cubic curves that have
     reflective control points.
  ============================================================ */
  var LANE_TOP = 50, LANE_BOTTOM = 650;
  var LANE_X = [150, 300, 450];
  var LANE_TINTS = [
    {fill:'#ffb8e8',glow:'#ff6fb3',deep:'#a83278'},
    {fill:'#b8e8ff',glow:'#5dc8ff',deep:'#2a78c8'},
    {fill:'#d4b8ff',glow:'#a96bff',deep:'#6a2aa8'}
  ];

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

  // Build a smooth serpentine path through a list of waypoints.
  // Uses Catmull-Rom-like approach: convert through-points to cubic
  // Beziers so every joint is C1-continuous (no jitter).
  function smoothPathThrough(points){
    if(points.length < 2) return '';
    var d = 'M ' + points[0].x + ' ' + points[0].y;
    // For each segment between p[i] and p[i+1], use tangent
    // derived from p[i-1]→p[i+1] and p[i]→p[i+2].
    for(var i=0;i<points.length-1;i++){
      var p0 = points[i-1] || points[i];
      var p1 = points[i];
      var p2 = points[i+1];
      var p3 = points[i+2] || points[i+1];
      var tension = 0.35; // 0.35 = nicely smooth
      var c1x = p1.x + (p2.x - p0.x) * tension;
      var c1y = p1.y + (p2.y - p0.y) * tension;
      var c2x = p2.x - (p3.x - p1.x) * tension;
      var c2y = p2.y - (p3.y - p1.y) * tension;
      d += ' C ' + c1x + ' ' + c1y + ', ' + c2x + ' ' + c2y + ', ' + p2.x + ' ' + p2.y;
    }
    return d;
  }

  function buildSerpentinePath(centerX, seed){
    var rand = mulberry32(seed);
    var n = 9; // waypoints
    var points = [];
    var totalH = LANE_BOTTOM - LANE_TOP;
    var step = totalH / (n - 1);
    for(var i=0;i<n;i++){
      var y = LANE_TOP + i*step;
      var x;
      if(i === 0 || i === n-1){
        // Start and end aligned at top/bottom centers
        x = centerX;
      } else {
        // Alternate left/right with slight randomness on amplitude
        var dir = (i % 2 === 0) ? 1 : -1;
        var amp = 55 + rand()*20;  // 55-75
        x = centerX + dir * amp;
      }
      points.push({x:x, y:y});
    }
    return smoothPathThrough(points);
  }

  // Create a ball element with embedded brand icon (no external img!)
  function createBallGroup(ball, idx){
    var g = svgEl('g',{'class':'ball-runner', transform:'translate('+LANE_X[idx]+','+LANE_TOP+')'});
    g.appendChild(svgEl('circle',{r:16, fill:ball.color, opacity:.45, filter:'url(#ballGlow)'}));
    g.appendChild(svgEl('circle',{r:14, fill:ball.bg, stroke:'rgba(0,0,0,.25)', 'stroke-width':1}));

    // Render inline fallback FIRST (so it shows if CDN image fails to load)
    var iconHTML = ICONS[ball.id];
    if(iconHTML){
      var wrap = svgEl('g',{transform:'translate(-9,-9) scale(0.75)'});
      var parser = new DOMParser();
      var doc = parser.parseFromString('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' + iconHTML + '</svg>', 'image/svg+xml');
      var nodes = doc.documentElement.childNodes;
      for(var i=0;i<nodes.length;i++){
        var node = nodes[i];
        if(node.nodeType === 1){ var imported = document.importNode(node, true); wrap.appendChild(imported); }
      }
      g.appendChild(wrap);
    } else {
      // Monogram fallback — render as SVG text
      var mono = ball.mono || ball.name.charAt(0).toUpperCase();
      var fontSize = mono.length > 1 ? 11 : 14;
      var t = svgEl('text', {
        'text-anchor':'middle', 'dominant-baseline':'central',
        'font-family':'Bungee, system-ui, sans-serif',
        'font-size':fontSize, 'font-weight':'900',
        fill: ball.color, x: 0, y: 1
      });
      t.textContent = mono;
      g.appendChild(t);
    }

    // Then layer the CDN image on top. If it loads, it covers the fallback.
    // If it 404s or is blocked, the fallback shows through unchanged.
    var slug = brandSlug(ball);
    var hex = ball.color.replace('#','');
    var url = 'https://cdn.simpleicons.org/' + slug + '/' + hex;
    var img = svgEl('image', {
      x:-9, y:-9, width:18, height:18,
      preserveAspectRatio:'xMidYMid meet'
    });
    img.setAttributeNS(XLINK_NS,'xlink:href', url);
    img.setAttribute('href', url);
    // If the CDN image errors, hide it so the fallback underneath remains visible
    img.addEventListener('error', function(){
      img.setAttribute('opacity','0');
    });
    g.appendChild(img);

    g.appendChild(svgEl('ellipse',{cx:-5,cy:-7,rx:5,ry:3,fill:'rgba(255,255,255,.5)'}));
    return g;
  }

  function startRace(){
    var minRacers = (mode === 'plinko') ? 1 : 2;
    if(racing || racers.length < minRacers) return;
    racing = true; leverBtn.disabled=true; pickBtn.disabled=true;
    winnerTag.classList.remove('show');
    confettiEl.classList.remove('show'); confettiEl.innerHTML='';
    var ctx = getAudio();
    if(ctx && ctx.state==='suspended'){ try{ctx.resume();}catch(e){} }

    if(mode === 'plinko'){ startPlinko(); return; }

    // Generate fresh pipe shapes for this race
    trackSeed = Math.floor(Math.random() * 999999) + 1;
    var useSameTube = sameTube && mode === 'quick' && racers.length === 3;
    var useTwoTube = mode === 'tourney' && racers.length === 2;
    var sceneMode = useSameTube ? 'sameTube' : useTwoTube ? 'twoTube' : 'all';
    rebuildLanes(trackSeed, sceneMode);

    // Lane mapping per racer:
    // - sameTube: all balls go in lane 1
    // - twoTube:  ball 0 in lane 0, ball 1 in lane 2 (skip middle)
    // - normal:   ball i in lane i
    var laneIdxFor;
    if(useSameTube) laneIdxFor = function(){ return 1; };
    else if(useTwoTube) laneIdxFor = function(i){ return i === 0 ? 0 : 2; };
    else laneIdxFor = function(i){ return i; };

    if(useSameTube){
      svg.classList.add('same-tube');
    } else {
      svg.classList.remove('same-tube');
    }
    if(useTwoTube){
      svg.classList.add('two-tube');
    } else {
      svg.classList.remove('two-tube');
    }

    SFX.steam(); setTimeout(function(){SFX.whoosh();}, 200);
    var olds = svg.querySelectorAll('.ball-runner');
    for(var k=0;k<olds.length;k++) olds[k].parentNode.removeChild(olds[k]);
    var ballEls = [];
    racers.forEach(function(b,i){
      var ln = laneIdxFor(i);
      var g = createBallGroup(b, ln);
      svg.appendChild(g);
      ballEls.push(g);
    });

    var baseDuration = 3500 + Math.random()*1500;
    // In same-tube mode, give each ball a small starting offset along
    // the path so they don't stack exactly. Encoded in `headStart`.
    var rd = racers.map(function(_,i){
      return {
        bias: 0.85 + Math.random()*0.30,
        wA:   0.012 + Math.random()*0.018,
        wF:   3 + Math.random()*3,
        ph:   Math.random()*Math.PI*2,
        // Tiny stagger (~3% of path) so balls aren't perfectly aligned
        headStart: useSameTube ? (i * 0.025) : 0,
        fin: false,
        finishOrder: -1
      };
    });
    var start = performance.now(), firstFin = -1, finishedCount = 0, lastTick=0;

    function frame(now){
      var el = now - start, allDone = true;
      if(soundOn && el-lastTick > 280 && el < baseDuration*0.95){ SFX.tick(); lastTick=el; }
      for(var i=0;i<racers.length;i++){
        var r = rd[i], dur = baseDuration / r.bias, t = el / dur;
        t += Math.sin(el/1000 * r.wF + r.ph) * r.wA;
        // Small head-start offset (same-tube only)
        t += r.headStart;
        if(t<0) t=0; else if(t>1) t=1;
        if(!r.fin && t>=1){
          r.fin=true;
          r.finishOrder = finishedCount++;
          if(firstFin===-1){ firstFin=i; announceWinner(i); }
        }
        if(!r.fin) allDone=false;
        var ln = laneIdxFor(i);
        var p = pathEls[ln].getPointAtLength(PATH_LENGTHS[ln]*t);
        ballEls[i].setAttribute('transform','translate('+p.x+','+p.y+')');
      }
      if(el < baseDuration*1.4 && !allDone){ animationId = requestAnimationFrame(frame); }
      else {
        var unfinished = [];
        for(var u=0;u<racers.length;u++){
          if(!rd[u].fin){
            var ut = el / (baseDuration / rd[u].bias);
            unfinished.push({idx:u, t:ut});
          }
        }
        unfinished.sort(function(a,b){ return b.t - a.t; });
        unfinished.forEach(function(item){ rd[item.idx].finishOrder = finishedCount++; });

        for(var j=0;j<racers.length;j++){
          var ln2 = laneIdxFor(j);
          var pp = pathEls[ln2].getPointAtLength(PATH_LENGTHS[ln2]);
          ballEls[j].setAttribute('transform','translate('+pp.x+','+pp.y+')');
        }
        racing=false; pickBtn.disabled=false;
        if(firstFin >= 0) finalizeRace(firstFin, rd);
      }
    }
    animationId = requestAnimationFrame(frame);
  }

  /* ============================================================
     PLINKO RACE — real physics
  ============================================================ */
  function startPlinko(){
    showPlinkoScene();

    // Pick 2 winner slots out of 3 (so it's the LOSER slot that's randomized)
    var loserSlot = Math.floor(Math.random() * 3);
    var winnerSlots = [true, true, true];
    winnerSlots[loserSlot] = false;

    // Pick where the ball will land (independently random — 1/3 chance to lose)
    var landingSlot = Math.floor(Math.random() * 3);
    var targetX = PLINKO.slotCenters[landingSlot];

    // Build the board with slot win/loss states REVEALED up-front
    rebuildPlinko(winnerSlots);

    // Brief "anticipation" pause so player can see the slots before the drop
    SFX.bracket();   // little anticipation chime

    // Remove any prior runners
    var olds = svg.querySelectorAll('.ball-runner, .plinko-winner-glow');
    for(var k=0;k<olds.length;k++) olds[k].parentNode.removeChild(olds[k]);

    // Create the ball at the top funnel (placed but stationary during pause)
    var ball = createBallGroup(racers[0], 0);
    var startX = 300, startY = 70;
    ball.setAttribute('transform', 'translate(' + startX + ',' + startY + ')');
    plinkoGroup.appendChild(ball);

    // ~900ms reveal pause, then drop
    setTimeout(function(){
      SFX.steam();
      setTimeout(function(){ SFX.whoosh(); }, 200);
      runPlinkoDrop(ball, startX, startY, targetX, landingSlot, winnerSlots);
    }, 900);
  }

  function runPlinkoDrop(ball, startX, startY, targetX, landingSlot, winnerSlots){
    // ---- Physics state ----
    var pos = { x: startX, y: startY };
    var vel = { x: (Math.random() - 0.5) * 30, y: 0 };

    // Constants tuned for ~600x700 viewBox & visible motion
    var GRAVITY = 720;            // px/s^2 — strong gravity
    var DT = 1 / 60;              // 60 Hz fixed timestep
    var RESTITUTION = 0.55;       // bounciness on peg (0=dead, 1=elastic)
    var WALL_RESTITUTION = 0.6;
    var FLOOR_RESTITUTION = 0.35;
    var FRICTION_AIR = 0.998;     // tiny per-step velocity dampening
    var FRICTION_BOUNCE = 0.92;   // tangential damping on collision
    var BIAS_ACCEL = 280;         // px/s^2 horizontal nudge toward target
    var MAX_VX = 320;             // cap horizontal speed for control
    var BALL_R = PLINKO.ballRadius;
    var PEG_R  = PLINKO.pegRadius;
    var COLLISION_R = BALL_R + PEG_R;
    var WALL_LEFT  = 80 + BALL_R + 2;
    var WALL_RIGHT = 520 - BALL_R - 2;
    var SLOT_TOP_Y = PLINKO.bottom - 10;     // y where slots begin
    var SLOT_FLOOR = SLOT_TOP_Y + PLINKO.slotHeight - BALL_R - 4;

    // Track recent collisions to prevent re-colliding with the same peg
    // multiple frames in a row (which causes jitter)
    var lastPegHit = -1;
    var settled = false;
    var settleStart = 0;

    // Sound throttle
    var lastTickT = 0;

    var pegs = PLINKO.pegPositions;
    var lastTime = performance.now();
    var accumulator = 0;
    var totalSimTime = 0;
    var maxSimTime = 8.0;  // hard timeout — physics can't run forever

    function step(){
      // Apply gravity
      vel.y += GRAVITY * DT;

      // Apply horizontal bias toward target slot.
      // Strength scales with how far down the ball is — stronger near the
      // bottom so the ball reliably reaches the chosen slot, but weak at
      // the top so the bouncing still looks natural and unpredictable.
      var depthFraction = Math.max(0, Math.min(1, (pos.y - PLINKO.top) / (PLINKO.bottom - PLINKO.top)));
      var biasStrength = 0.3 + depthFraction * 1.4;  // 0.3 → 1.7
      var dx = targetX - pos.x;
      var biasDir = (dx > 0) ? 1 : (dx < 0) ? -1 : 0;
      // Only nudge if not extremely close to target column
      if(Math.abs(dx) > 6){
        vel.x += biasDir * BIAS_ACCEL * biasStrength * DT;
      }

      // Air friction
      vel.x *= FRICTION_AIR;
      vel.y *= FRICTION_AIR;

      // Cap horizontal velocity so ball doesn't go zooming sideways
      if(vel.x >  MAX_VX) vel.x =  MAX_VX;
      if(vel.x < -MAX_VX) vel.x = -MAX_VX;

      // Integrate position
      pos.x += vel.x * DT;
      pos.y += vel.y * DT;

      // Wall collisions (rails on each side)
      if(pos.x < WALL_LEFT){
        pos.x = WALL_LEFT;
        vel.x = Math.abs(vel.x) * WALL_RESTITUTION;
      } else if(pos.x > WALL_RIGHT){
        pos.x = WALL_RIGHT;
        vel.x = -Math.abs(vel.x) * WALL_RESTITUTION;
      }

      // Peg collisions
      for(var i=0; i<pegs.length; i++){
        var peg = pegs[i];
        var ddx = pos.x - peg.x;
        var ddy = pos.y - peg.y;
        var distSq = ddx*ddx + ddy*ddy;
        var minDist = COLLISION_R;
        if(distSq < minDist * minDist){
          var dist = Math.sqrt(distSq) || 0.001;
          // Normal direction (peg → ball)
          var nx = ddx / dist;
          var ny = ddy / dist;
          // Push ball outside the peg
          var overlap = minDist - dist;
          pos.x += nx * overlap;
          pos.y += ny * overlap;

          // Reflect velocity along normal: v' = v - (1+e)(v·n)n
          var vDotN = vel.x * nx + vel.y * ny;
          if(vDotN < 0){  // Only bounce if moving toward peg
            var bounceFactor = (1 + RESTITUTION);
            vel.x -= bounceFactor * vDotN * nx;
            vel.y -= bounceFactor * vDotN * ny;
            // Apply tangential damping so ball doesn't slide forever
            vel.x *= FRICTION_BOUNCE;
            vel.y *= FRICTION_BOUNCE;
            // Add tiny random kick so ball doesn't get stuck in symmetric paths
            vel.x += (Math.random() - 0.5) * 30;

            // Sound (throttled)
            if(soundOn && totalSimTime - lastTickT > 0.07 && i !== lastPegHit){
              SFX.tick();
              lastTickT = totalSimTime;
            }
            lastPegHit = i;
          }
        }
      }

      // Reached slot area?
      if(pos.y > SLOT_TOP_Y){
        // Determine which slot we're nearest to (by x position)
        // and gently funnel into it
        var nearestSlot = 0;
        var nearestDist = Infinity;
        for(var s=0; s<3; s++){
          var d = Math.abs(pos.x - PLINKO.slotCenters[s]);
          if(d < nearestDist){ nearestDist = d; nearestSlot = s; }
        }
        var slotCx = PLINKO.slotCenters[nearestSlot];
        // Strong pull toward the chosen slot center (not landingSlot — natural slot)
        // BUT: we want it to go to landingSlot. So override here:
        slotCx = PLINKO.slotCenters[landingSlot];
        var slotDx = slotCx - pos.x;
        vel.x += slotDx * 8 * DT;     // strong centering force in slot funnel
        vel.x *= 0.85;                // dampen lateral bouncing in slot

        // Slot floor collision
        if(pos.y > SLOT_FLOOR){
          pos.y = SLOT_FLOOR;
          if(vel.y > 0){
            vel.y = -vel.y * FLOOR_RESTITUTION;
          }
          // Strong horizontal damping when on the floor
          vel.x *= 0.7;
        }

        // Slot side walls — keep ball within slot
        var slotLeft = slotCx - PLINKO.slotWidth / 2 + BALL_R + 2;
        var slotRight = slotCx + PLINKO.slotWidth / 2 - BALL_R - 2;
        if(pos.x < slotLeft && pos.y > SLOT_TOP_Y + 10){
          pos.x = slotLeft; vel.x = Math.abs(vel.x) * 0.4;
        } else if(pos.x > slotRight && pos.y > SLOT_TOP_Y + 10){
          pos.x = slotRight; vel.x = -Math.abs(vel.x) * 0.4;
        }

        // Settled? (low velocity AND on floor for >0.4s)
        var speed = Math.sqrt(vel.x*vel.x + vel.y*vel.y);
        if(speed < 25 && Math.abs(pos.y - SLOT_FLOOR) < 4){
          if(!settled){ settled = true; settleStart = totalSimTime; }
          else if(totalSimTime - settleStart > 0.35){
            return true;  // Done!
          }
        } else {
          settled = false;
        }
      }

      return false;
    }

    function frame(now){
      var deltaSec = (now - lastTime) / 1000;
      if(deltaSec > 0.1) deltaSec = 0.1;  // Clamp to avoid huge jumps
      lastTime = now;
      accumulator += deltaSec;

      var done = false;
      // Fixed-timestep physics loop
      while(accumulator >= DT){
        if(step()){ done = true; break; }
        accumulator -= DT;
        totalSimTime += DT;
        if(totalSimTime > maxSimTime){ done = true; break; }
      }

      // Render current position
      ball.setAttribute('transform', 'translate(' + pos.x + ',' + pos.y + ')');

      if(!done){
        animationId = requestAnimationFrame(frame);
      } else {
        // Snap to slot floor for tidy finish
        var snapX = PLINKO.slotCenters[landingSlot];
        var snapY = SLOT_FLOOR;
        ball.setAttribute('transform', 'translate(' + snapX + ',' + snapY + ')');
        finalizePlinko(landingSlot, winnerSlots);
      }
    }
    animationId = requestAnimationFrame(frame);
  }

  function finalizePlinko(landingSlot, winnerSlots){
    // Slots are already styled (green/red) from the upfront reveal.
    // Pulse the landed slot so the player can see where the ball ended up.
    var landedRect = plinkoGroup.querySelector('.plinko-slot-' + landingSlot);
    if(landedRect){
      // Add a pulsing outer ring on the landed slot
      var bbox = landedRect.getBBox();
      var pulse = svgEl('rect', {
        x: bbox.x - 4, y: bbox.y - 4,
        width: bbox.width + 8, height: bbox.height + 8, rx: 12,
        fill: 'none',
        stroke: winnerSlots[landingSlot] ? '#7be88a' : '#ffaaaa',
        'stroke-width': 4,
        'class': 'plinko-winner-glow'
      });
      // SVG SMIL animation pulse
      var anim = document.createElementNS(SVG_NS, 'animate');
      anim.setAttribute('attributeName', 'opacity');
      anim.setAttribute('values', '1;0.3;1');
      anim.setAttribute('dur', '0.8s');
      anim.setAttribute('repeatCount', 'indefinite');
      pulse.appendChild(anim);
      plinkoGroup.appendChild(pulse);
    }

    var won = winnerSlots[landingSlot] === true;
    var ball = racers[0];

    if(won){
      SFX.win();
      burstConfetti(ball.color);
      winnerTag.textContent = '🏆 ' + ball.name.toUpperCase() + ' WINS!';
      winnerTag.classList.add('show');
    } else {
      SFX.lose();
      winnerTag.textContent = '💔 ' + ball.name.toUpperCase() + ' LOST';
      winnerTag.classList.add('show');
    }

    // Record history & eliminations
    if(won){
      history.unshift({
        ts: Date.now(), mode: 'plinko', winnerId: ball.id,
        contestants: [ball.id]
      });
    } else {
      eliminated[ball.id] = true;
      saveEliminated();
      history.unshift({
        ts: Date.now(), mode: 'plinko', winnerId: null, loserId: ball.id,
        contestants: [ball.id]
      });
    }
    saveHistory();
    raceNumber++;
    raceNumEl.textContent = 'RACE ' + (raceNumber<10?'0':'') + raceNumber;

    setTimeout(function(){
      showPlinkoResultPopup(ball, won, landingSlot, winnerSlots);
      racing = false;
      pickBtn.disabled = false;
    }, 1200);
  }

  function finalizeRace(winnerIdx, racerData){
    var winner = racers[winnerIdx];

    // Build sorted finish list: 1st place → last
    var finishOrder = racers.map(function(r,i){
      return {ball:r, place:racerData[i].finishOrder};
    }).sort(function(a,b){ return a.place - b.place; });

    // Determine which finishers get eliminated.
    // - Tournament (1v1): the loser is always eliminated
    // - Quick race (3 balls): bottom `elimCount` (1 or 2) get eliminated
    var elimList, safeList;
    if(mode === 'tourney'){
      // Tournament: the loser is "eliminated from the tournament" but
      // NOT added to the global eliminated pool (else after one tourney
      // there'd be no balls left for quick races).
      elimList = [finishOrder[1].ball];
      safeList = [];
    } else {
      var elimN = Math.min(elimCount, finishOrder.length - 1); // can't eliminate winner
      elimList = finishOrder.slice(finishOrder.length - elimN).map(function(f){ return f.ball; });
      safeList = finishOrder.slice(1, finishOrder.length - elimN).map(function(f){ return f.ball; });
    }
    // Only persist eliminations in non-tournament modes
    if(mode !== 'tourney'){
      elimList.forEach(function(l){ eliminated[l.id] = true; });
      saveEliminated();
    }
    SFX.lose();

    if(mode === 'quick'){
      history.unshift({ts:Date.now(), mode:'quick', winnerId:winner.id, contestants:racers.map(function(r){return r.id;})});
      saveHistory();
      raceNumber++;
      raceNumEl.textContent = 'RACE ' + (raceNumber<10?'0':'') + raceNumber;
      setTimeout(function(){ showResultPopup(winner, safeList, elimList, false); }, 800);
    } else {
      setTimeout(function(){
        showResultPopup(winner, [], elimList, true);
      }, 800);
    }
  }

  /* ============================================================
     TOURNAMENT — variable size, auto-advancing bracket
  ============================================================ */
  function startTournament(contestants){
    if(contestants.length < 2) return;

    // Shuffle for random seeding
    var s = contestants.slice();
    for(var i = s.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = s[i]; s[i] = s[j]; s[j] = t;
    }

    // Round up to next power of 2 — extra slots become byes
    var totalSlots = 1;
    while(totalSlots < s.length) totalSlots *= 2;
    var byes = totalSlots - s.length;
    var totalRounds = Math.log2(totalSlots);  // e.g. 32 → 5 rounds

    // Determine round names (working backwards from FINAL)
    function roundName(roundIdx, totalRounds){
      var fromEnd = totalRounds - roundIdx - 1;
      if(fromEnd === 0) return 'FINAL';
      if(fromEnd === 1) return 'SEMIFINALS';
      if(fromEnd === 2) return 'QUARTERFINALS';
      if(fromEnd === 3) return 'ROUND OF 16';
      if(fromEnd === 4) return 'ROUND OF 32';
      if(fromEnd === 5) return 'ROUND OF 64';
      return 'ROUND ' + (roundIdx + 1);
    }

    // Build round 1 entrants — give the first `byes` players a bye
    // (they auto-advance to round 2). The remaining play matches.
    var byePlayers = s.slice(0, byes);
    var matchPlayers = s.slice(byes);

    var rounds = [];
    for(var r = 0; r < totalRounds; r++){
      rounds.push({ name: roundName(r, totalRounds), matches: [] });
    }

    // Round 1: pair up matchPlayers
    for(var p = 0; p < matchPlayers.length; p += 2){
      rounds[0].matches.push({
        a: matchPlayers[p],
        b: matchPlayers[p + 1],
        winner: null
      });
    }

    // Pre-populate round 2 with bye players in their seeded slots.
    // Bye players occupy the early slots of round 2; round-1 winners
    // fill the remaining slots in order.
    if(rounds.length > 1){
      var r2matches = totalSlots / 4;
      // Round 2 has totalSlots/2 entrants → totalSlots/4 matches.
      // Each match pairs two entrants. We need a list of `totalSlots/2`
      // round-2 entrants where byePlayers occupy specific positions.
      // Simple seeding: first `byes` slots of round 2 are bye players;
      // the rest (`totalSlots/2 - byes`) come from round 1 winners.
      var entrantCount = totalSlots / 2;
      // We don't know round 1 winners yet — fill with placeholders
      var slots = new Array(entrantCount).fill(null);
      for(var b = 0; b < byes && b < entrantCount; b++){
        slots[b] = byePlayers[b];
      }
      // Pair them into matches with the as-yet-unknown round-1 winners
      for(var m = 0; m < r2matches; m++){
        rounds[1].matches.push({
          a: slots[m * 2] || null,           // bye player or null (TBD)
          b: slots[m * 2 + 1] || null,
          winner: null
        });
      }
    }

    tourney = {
      contestants: s,
      rounds: rounds,
      totalRounds: totalRounds,
      currentRound: 0,
      currentMatch: 0,
      champion: null,
      autoPlay: false   // when true, races auto-start without lever
    };

    SFX.bracket();
    showBracketCard(/* atRoundStart */ true);
  }

    return '<div class="' + classes + '"><div class="ball-tiny" style="background:' +
      b.bg + '">' + ballIconHTML(b) + '</div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +

      html += '<div style="font-size:16px">' + tourney.champion.name.toUpperCase() + '</div>';

      html += tourney.contestants.length + ' CONTESTANTS · ' + round.matches.length + ' MATCH' + (round.matches.length === 1 ? '' : 'ES');
      html += '</div>';
    }

    // Compact bracket view — show only current and adjacent rounds
    // to keep the card readable for big brackets.
    html += '<div class="bracket-rounds">';
    var roundsToShow = getRoundsToShow();
    roundsToShow.forEach(function(ri){
      var r = tourney.rounds[ri];
      html += '<div class="bracket-round"><div class="lbl">' + r.name + '</div>';
      if(r.matches.length === 0){
        html += '<div class="competitor pending">—</div>';
      } else {
        // Limit displayed matches per round if there are too many
        var matchesToShow = r.matches.length > 8 ? 8 : r.matches.length;
        for(var mi = 0; mi < matchesToShow; mi++){
          var m = r.matches[mi];
          var cur = ri === tourney.currentRound && mi === tourney.currentMatch && !tourney.champion;
          html += '<div class="matchup" style="' + (cur ? 'box-shadow:0 0 0 2px #ffd84a;border-radius:8px;padding:2px' : '') + '">';
          html += competitorHTML(m.a, m.winner === m.a, false);
          html += competitorHTML(m.b, m.winner === m.b, false);
          html += '</div>';
        }
        if(r.matches.length > matchesToShow){
          html += '<div style="font-size:9px;color:rgba(255,255,255,.6);text-align:center;margin-top:4px">+' + (r.matches.length - matchesToShow) + ' more</div>';
        }
      }
      html += '</div>';
    });
    html += '<div class="bracket-round"><div class="lbl">CHAMPION</div>';
    if(tourney.champion) html += competitorHTML(tourney.champion, true);
    else html += '<div class="competitor pending">?</div>';
    html += '</div>';
    html += '</div>';

    // Action buttons
    if(tourney.champion){
      html += '<div class="bracket-actions"><button class="btn-quit" id="bracketDone">DONE</button></div>';
    } else {
      html += '<div class="bracket-actions">';
      html += '<button class="btn-quit" id="bracketQuit">QUIT</button>';
      var nextLabel = atRoundStart ? ('▶ START ' + round.name) : 'NEXT MATCH ▶';
      html += '<button class="btn-next" id="bracketNext">' + nextLabel + '</button>';
      html += '</div>';
    }
    bracketCard.innerHTML = html;

    if(tourney.champion){
      $('bracketDone').addEventListener('click', function(){ SFX.click(); resetAll(); });
    } else {
      $('bracketQuit').addEventListener('click', function(){
        SFX.click();
        customConfirm('Quit tournament?', 'You will lose your progress.', function(){ resetAll(); });
      });
      $('bracketNext').addEventListener('click', function(){
        SFX.pop();
        bracketOverlay.classList.remove('open');
        startTourneyMatch();
      });
    }
  }

  // Decide which rounds to display in the bracket card.
  // For small brackets (≤3 rounds), show all. For larger, show
  // the current round, the previous round, and the next round.
  function getRoundsToShow(){
    if(!tourney) return [];
    var n = tourney.rounds.length;
    if(n <= 3){
      var all = [];
      for(var i = 0; i < n; i++) all.push(i);
      return all;
    }
    var cur = tourney.currentRound;
    var indices = [];
    if(cur > 0) indices.push(cur - 1);
    indices.push(cur);
    if(cur < n - 1) indices.push(cur + 1);
    return indices;
  }

  // Set up and run the current tournament match
  function startTourneyMatch(){
    if(!tourney || tourney.champion) return;
    var round = tourney.rounds[tourney.currentRound];
    var match = round.matches[tourney.currentMatch];
    if(!match) return;

    // If this match has a missing competitor (one had a bye and the other
    // hasn't been determined yet — shouldn't happen with proper seeding,
    // but defensive), auto-advance.
    if(!match.a && !match.b){
      // No-op match, skip
      tourney.currentMatch++;
      checkRoundComplete();
      return;
    }
    if(!match.a || !match.b){
      // Auto-advance the present player
      var auto = match.a || match.b;
      match.winner = auto;
      tourney.currentMatch++;
      setTimeout(function(){ checkRoundComplete(); }, 100);
      return;
    }

    racers = [match.a, match.b];
    renderPlatform();
    raceNumEl.textContent = round.name.replace('FINALS', 'FINAL') + ' M' + (tourney.currentMatch + 1);

    // Auto-start the race after a brief moment so the user sees the matchup
    setTimeout(function(){
      if(racing || !tourney || tourney.champion) return;
      startRace();
    }, 700);
  }

  function advanceTournament(winner){
    if(!tourney) return;
    var round = tourney.rounds[tourney.currentRound];
    round.matches[tourney.currentMatch].winner = winner;
    SFX.bracket();
    tourney.currentMatch++;
    checkRoundComplete();
  }

  function checkRoundComplete(){
    if(!tourney || tourney.champion) return;
    var round = tourney.rounds[tourney.currentRound];

    // Still matches left in this round — auto-start next match
    if(tourney.currentMatch < round.matches.length){
      // Brief pause then auto-start next match. No bracket card.
      setTimeout(function(){
        if(tourney && !tourney.champion) startTourneyMatch();
      }, 400);
      return;
    }

    // Round complete — populate next round with winners
    var nextIdx = tourney.currentRound + 1;
    if(nextIdx < tourney.rounds.length){
      var winners = round.matches.map(function(m){ return m.winner; });
      var nextRound = tourney.rounds[nextIdx];
      var winnerCursor = 0;
      // Fill empty `b` slots first, then matches with no players
      for(var i = 0; i < nextRound.matches.length; i++){
        var nm = nextRound.matches[i];
        if(!nm.a){ nm.a = winners[winnerCursor++]; }
        if(!nm.b){ nm.b = winners[winnerCursor++]; }
      }
      // If round 2+ wasn't pre-populated, pair fresh
      if(nextRound.matches.length === 0){
        for(var w = 0; w < winners.length; w += 2){
          nextRound.matches.push({ a: winners[w], b: winners[w + 1], winner: null });
        }
      }
      tourney.currentRound = nextIdx;
      tourney.currentMatch = 0;

      // Show bracket card briefly to mark round transition
      setTimeout(function(){
        if(tourney && !tourney.champion) showBracketCard(/* atRoundStart */ true);
      }, 600);
    } else {
      // Tournament complete!
      tourney.champion = round.matches[round.matches.length - 1].winner;
      history.unshift({
        ts: Date.now(), mode: 'tourney',
        winnerId: tourney.champion.id,
        contestants: tourney.contestants.map(function(c){ return c.id; })
      });
      saveHistory();
      SFX.champion();
      burstConfetti(tourney.champion.color);
      setTimeout(function(){ showBracketCard(); }, 800);
    }
  }

  /* ============================================================
     SOUND TOGGLE
  ============================================================ */
  function updateSoundBtn(){
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
  }
  soundBtn.addEventListener('click', function(){
    soundOn = !soundOn; updateSoundBtn(); saveSound();
    if(soundOn){ var c=getAudio(); if(c&&c.state==='suspended'){try{c.resume();}catch(e){}} SFX.pop(); }
  });

  /* ============================================================
     HISTORY UI
  ============================================================ */
  historyBtn.addEventListener('click', function(){ SFX.click(); renderHistory(); historySheet.classList.add('open'); });
  closeHistory.addEventListener('click', function(){ SFX.click(); historySheet.classList.remove('open'); });
  clearHistoryBtn.addEventListener('click', function(){
    if(history.length===0) return;
    customConfirm('Clear history?', 'This will delete all ' + history.length + ' past races.', function(){
      history=[]; saveHistory(); renderHistory();
    });
  });

  function renderHistory(){
    historyCountEl.textContent = history.length;
    if(history.length===0){
      historyList.innerHTML = '<div class="empty-state"><span class="big">🏁</span>No races yet!<br/>Run a race to see it here.</div>';
      leaderboard.style.display = 'none';
      return;
    }
    var html = '';
    history.forEach(function(h,i){
      // Plinko losses: no winner, just a losing ball
      if(h.mode === 'plinko' && !h.winnerId && h.loserId){
        var l = findBall(h.loserId); if(!l) return;
        html += '<div class="h-row"><div class="h-num">#'+(history.length-i)+'</div>';
        html += '<div class="h-winner" style="background:'+l.bg+';filter:grayscale(.6);opacity:.7">'+ballIconHTML(l)+'</div>';
        html += '<div class="h-info"><div class="name">'+l.name+' <span style="color:#ff6a6a;font-size:10px">💔 PLINKO LOSS</span></div>';
        html += '<div class="vs">eliminated</div></div><div>✕</div></div>';
        return;
      }
      var w = findBall(h.winnerId); if(!w) return;
      var others = h.contestants.filter(function(c){return c!==h.winnerId;}).map(function(id){var b=findBall(id);return b?b.name:'';}).filter(Boolean).join(' · ');
      var modeTag = '';
      if(h.mode === 'tourney') modeTag = ' <span style="color:#ffd84a;font-size:10px">🏆 CHAMP</span>';
      else if(h.mode === 'plinko') modeTag = ' <span style="color:#5de8b8;font-size:10px">🎯 PLINKO WIN</span>';
      var vsLine = others ? ('vs ' + others) : 'solo plinko';
      html += '<div class="h-row"><div class="h-num">#'+(history.length-i)+'</div><div class="h-winner" style="background:'+w.bg+'">'+ballIconHTML(w)+'</div><div class="h-info"><div class="name">'+w.name+modeTag+'</div><div class="vs">'+vsLine+'</div></div><div>🏆</div></div>';
    });
    historyList.innerHTML = html;
    var counts = {};
    history.forEach(function(h){ if(h.winnerId) counts[h.winnerId] = (counts[h.winnerId]||0)+1; });
    var sorted = Object.keys(counts).map(function(id){return {ball:findBall(id),n:counts[id]};}).filter(function(x){return x.ball;}).sort(function(a,b){return b.n-a.n;}).slice(0,5);
    if(sorted.length){
      leaderboard.style.display = 'block';
      var lb = '<h3>🏅 TOP WINNERS</h3>';
      sorted.forEach(function(x,i){
        lb += '<div class="leader-row"><div style="font-family:Bungee,cursive;color:#ffd84a;width:16px">'+(i+1)+'.</div><div class="ball-mini" style="background:'+x.ball.bg+'">'+ballIconHTML(x.ball)+'</div><div class="nm">'+x.ball.name+'</div><div class="wn">'+x.n+(x.n===1?' WIN':' WINS')+'</div></div>';
      });
      leaderboard.innerHTML = lb;
    } else {
      leaderboard.style.display = 'none';
    }
  }

  /* BOOT */
  loadHistory();
  loadSound();
  loadEliminated();
  loadSettings();
  if(!loadRoster()) pickRandomRoster();   // sample brands from pool if not stored
  updateSoundBtn();
  // Sync elim toggle UI to loaded value
  var elimPills = elimBar.querySelectorAll('.elim-pill');
  for(var ep=0;ep<elimPills.length;ep++){
    if(parseInt(elimPills[ep].dataset.elim,10) === elimCount) elimPills[ep].classList.add('active');
    else elimPills[ep].classList.remove('active');
  }
  // Sync tube toggle UI to loaded value
  var tubePills = tubeBar.querySelectorAll('.elim-pill');
  for(var tp=0;tp<tubePills.length;tp++){
    var isSame = tubePills[tp].dataset.tube === 'same';
    if(isSame === sameTube) tubePills[tp].classList.add('active');
    else tubePills[tp].classList.remove('active');
  }
  renderPlatform();

})();
</script>
</body>
